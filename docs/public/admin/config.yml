backend:
  name: github
  repo: Leon-cypher/poker-manual
  branch: main
  base_url: https://poker-manual.pages.dev  # 你的 Cloudflare Pages 網址

media_folder: docs/public
public_folder: /

locale: zh_Hant

collections:
  - name: manual
    label: 核心手冊
    folder: docs
    create: true
    extension: md
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 內容, name: body, widget: markdown }

