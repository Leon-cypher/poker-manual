<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>樂玩德州撲克 | 內容管理</title>
  </head>
  <body>
    <script>
      // GitHub COOP severs popup reference, causing Decap CMS to remove its message listener.
      // Fix: intercept window.open and return a fake reference that never appears closed.
      const _originalOpen = window.open.bind(window);
      window.open = function(url, name, features) {
        _originalOpen(url, name, features); // open the real popup
        return {
          closed: false,
          focus: function() {},
          close: function() {}
        };
      };
    </script>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
